<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Head -->
  <circle cx="100" cy="100" r="60" fill="#ffa500" stroke="#000" stroke-width="2"/>
  
  <!-- Ears -->
  <path d="M 50 70 L 40 30 L 70 60" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <path d="M 150 70 L 160 30 L 130 60" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <polygon points="45,35 50,50 55,40" fill="#ffb6c1"/>
  <polygon points="155,35 150,50 145,40" fill="#ffb6c1"/>
  
  <!-- Eyes -->
  <ellipse cx="80" cy="90" rx="12" ry="18" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="120" cy="90" rx="12" ry="18" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="80" cy="95" rx="6" ry="12" fill="#000"/>
  <ellipse cx="120" cy="95" rx="6" ry="12" fill="#000"/>
  
  <!-- Nose -->
  <path d="M 100 105 L 95 115 L 105 115 Z" fill="#ff69b4"/>
  
  <!-- Mouth -->
  <path d="M 100 115 Q 85 125 75 120" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M 100 115 Q 115 125 125 120" stroke="#000" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="50" y1="100" x2="20" y2="95" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="110" x2="20" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="50" y1="120" x2="20" y2="125" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="100" x2="180" y2="95" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="110" x2="180" y2="110" stroke="#000" stroke-width="2"/>
  <line x1="150" y1="120" x2="180" y2="125" stroke="#000" stroke-width="2"/>
</svg>
