<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Body -->
  <ellipse cx="100" cy="100" rx="8" ry="40" fill="#000" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="12" fill="#000"/>
  
  <!-- Antennae -->
  <path d="M 100 70 Q 85 50 80 45" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M 100 70 Q 115 50 120 45" stroke="#000" stroke-width="2" fill="none"/>
  <circle cx="80" cy="45" r="3" fill="#000"/>
  <circle cx="120" cy="45" r="3" fill="#000"/>
  
  <!-- Left Upper Wing -->
  <ellipse cx="65" cy="80" rx="35" ry="40" fill="#ff69b4" stroke="#000" stroke-width="2"/>
  <ellipse cx="65" cy="80" rx="20" ry="25" fill="#ffb6c1"/>
  <circle cx="55" cy="75" r="8" fill="#fff"/>
  <circle cx="70" cy="90" r="6" fill="#fff"/>
  
  <!-- Right Upper Wing -->
  <ellipse cx="135" cy="80" rx="35" ry="40" fill="#ff69b4" stroke="#000" stroke-width="2"/>
  <ellipse cx="135" cy="80" rx="20" ry="25" fill="#ffb6c1"/>
  <circle cx="145" cy="75" r="8" fill="#fff"/>
  <circle cx="130" cy="90" r="6" fill="#fff"/>
  
  <!-- Left Lower Wing -->
  <ellipse cx="70" cy="125" rx="30" ry="35" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <ellipse cx="70" cy="125" rx="18" ry="22" fill="#ffeb3b"/>
  <circle cx="65" cy="120" r="6" fill="#fff"/>
  
  <!-- Right Lower Wing -->
  <ellipse cx="130" cy="125" rx="30" ry="35" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <ellipse cx="130" cy="125" rx="18" ry="22" fill="#ffeb3b"/>
  <circle cx="135" cy="120" r="6" fill="#fff"/>
</svg>
