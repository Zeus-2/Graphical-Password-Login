<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Head -->
  <circle cx="100" cy="100" r="60" fill="#ffb6c1" stroke="#000" stroke-width="2"/>
  
  <!-- Ears -->
  <path d="M 55 65 L 45 45 L 65 55" fill="#ffb6c1" stroke="#000" stroke-width="2"/>
  <path d="M 145 65 L 155 45 L 135 55" fill="#ffb6c1" stroke="#000" stroke-width="2"/>
  
  <!-- Snout -->
  <ellipse cx="100" cy="110" rx="30" ry="25" fill="#ff69b4" stroke="#000" stroke-width="2"/>
  
  <!-- Nostrils -->
  <ellipse cx="90" cy="110" rx="6" ry="8" fill="#000"/>
  <ellipse cx="110" cy="110" rx="6" ry="8" fill="#000"/>
  
  <!-- Eyes -->
  <circle cx="80" cy="85" r="8" fill="#000"/>
  <circle cx="120" cy="85" r="8" fill="#000"/>
  <circle cx="82" cy="83" r="3" fill="#fff"/>
  <circle cx="122" cy="83" r="3" fill="#fff"/>
  
  <!-- Smile -->
  <path d="M 75 125 Q 100 135 125 125" stroke="#000" stroke-width="2" fill="none"/>
</svg>
